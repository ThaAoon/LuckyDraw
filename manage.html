<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATABASE CONTROL PANEL // จัดการรายชื่อ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #030712;
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.03) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .tech-font { font-family: 'Orbitron', 'Prompt', sans-serif; }
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .glow-text-green { text-shadow: 0 0 8px rgba(34, 197, 94, 0.6); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center relative overflow-x-hidden text-slate-200">

    <div class="absolute top-1/3 right-1/4 w-80 h-80 bg-green-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="relative bg-slate-950/80 backdrop-blur-xl p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-green-500/30">
        
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-green-400 rounded-tl-lg"></div>
        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-green-400 rounded-tr-lg"></div>
        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-green-400 rounded-bl-lg"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-green-400 rounded-br-lg"></div>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5 pb-4 border-b border-green-500/20">
            <div>
                <span class="text-[10px] text-green-400 tracking-widest tech-font uppercase block mb-1">// DATABASE_CORE</span>
                <h1 class="text-2xl font-bold text-white tech-font tracking-wide glow-text-green">DATA CONTROL PANEL</h1>
            </div>
            <a href="index.html" class="bg-slate-900 hover:bg-slate-800 text-green-400 border border-green-500/40 px-4 py-2 rounded-xl text-xs font-semibold tracking-wider tech-font transition active:scale-95">
                BACK TO SYSTEM //
            </a>
        </div>

        <!-- ส่วนของการวางข้อมูลคัดลอกแบบหลายตัวแปร -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <label class="text-xs font-medium text-green-400/80 uppercase tracking-wider tech-font">
                    INPUT_TEMP_BULK_DATA : วางรายชื่อเสริมชั่วคราว
                </label>
                <span class="text-[10px] text-slate-500 font-medium">ลำดับ: รหัส ชื่อ นามสกุล แผนก หน่วยงาน หมายเหตุ</span>
            </div>
            <div class="space-y-3">
                <textarea id="input-names" rows="4" placeholder="0005 สมชาย รักงาน IT Support_Unit -&#10;0006 สมศรี ตั้งใจ HR Learning_Team VIP" 
                    class="w-full px-4 py-3 bg-slate-900/90 border border-green-500/30 rounded-xl focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 text-white placeholder-slate-600 transition text-sm font-mono resize-none"></textarea>
                
                <button onclick="addBulkNames()" 
                    class="w-full bg-green-600 hover:bg-green-500 text-slate-950 font-bold py-3 rounded-xl transition transform active:scale-95 cursor-pointer tech-font tracking-widest text-xs glow-green shadow-green-500/20 flex items-center justify-center gap-2">
                    <span>📋</span> INJECT_BULK_DATA
                </button>
            </div>
        </div>

        <!-- ตารางแสดงรายชื่อเสริม -->
        <div class="bg-slate-900/40 border border-green-500/20 rounded-xl p-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xs font-semibold tracking-wider text-slate-400 tech-font uppercase">
                    TEMP_INJECTED_LIST (<span id="count" class="text-green-400 glow-text-green">0</span>)
                </h2>
                <button onclick="clearAll()" class="text-xs text-rose-400 hover:text-rose-300 hover:underline cursor-pointer tech-font tracking-wide">
                    // CLEAR_TEMP_DATA
                </button>
            </div>

            <!-- กล่องแสดงผลตารางรายชื่อแบบแบ่ง Column -->
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-green-400/70 font-mono">
                            <th class="p-2">รหัส</th>
                            <th class="p-2">ชื่อ-นามสกุล</th>
                            <th class="p-2">แผนก/หน่วยงาน</th>
                            <th class="p-2">หมายเหตุ</th>
                            <th class="p-2 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="list-container" class="divide-y divide-slate-900 bg-slate-950/40 font-sans text-slate-300">
                        <!-- ถูกเติมด้วย JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

    <script>
        let tempNames = [];

        window.onload = function() {
            const storedNames = localStorage.getItem('lucky_names');
            if (storedNames) {
                tempNames = JSON.parse(storedNames);
            }
            renderList();
        };

        // function renderList() {
        //     const container = document.getElementById('list-container');
        //     const countSpan = document.getElementById('count');
        //     container.innerHTML = '';
        //     countSpan.innerText = tempNames.length;

        //     if (tempNames.length === 0) {
        //         container.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-600 font-mono">// NO_TEMP_RECORDS</td></tr>`;
        //         return;
        //     }

        //     tempNames.forEach((lineText, index) => {
        //         const [id, firstName, lastName, department, unit, remark] = lineText.trim().split(/\s+/);
                
        //         const tr = document.createElement('tr');
        //         tr.className = 'hover:bg-green-500/5 transition text-[11px] md:text-xs';
        //         tr.innerHTML = `
        //             <td class="p-2 font-mono text-green-400">${id || "N/A"}</td>
        //             <td class="p-2">${(firstName || "") + " " + (lastName || "")}</td>
        //             <td class="p-2">${(department || "N/A") + " / " + (unit || "N/A")}</td>
        //             <td class="p-2 text-slate-500">${remark || "-"}</td>
        //             <td class="p-2 text-center">
        //                 <button onclick="deleteName(${index})" class="text-rose-400 hover:text-rose-300 px-1 font-mono">[DEL]</button>
        //             </td>
        //         `;
        //         container.appendChild(tr);
        //     });
        // }

        function renderList() {
            const container = document.getElementById('list-container');
            const countSpan = document.getElementById('count');
            container.innerHTML = '';
            countSpan.innerText = tempNames.length;

            if (tempNames.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-600 font-mono">// NO_TEMP_RECORDS</td></tr>`;
                return;
            }

            tempNames.forEach((lineText, index) => {
                // เปลี่ยนมาใช้สปลิตด้วยเครื่องหมาย | และตัดช่องว่างออก
                const columns = lineText.split('|').map(item => item.trim());
                const [id, firstName, lastName, department, unit, remark] = columns;
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-green-500/5 transition text-[11px] md:text-xs';
                tr.innerHTML = `
                    <td class="p-2 font-mono text-green-400">${id || "N/A"}</td>
                    <td class="p-2">${(firstName || "") + " " + (lastName || "")}</td>
                    <td class="p-2">${(department || "N/A") + " / " + (unit || "N/A")}</td>
                    <td class="p-2 text-slate-500">${remark || "-"}</td>
                    <td class="p-2 text-center">
                        <button onclick="deleteName(${index})" class="text-rose-400 hover:text-rose-300 px-1 font-mono">[DEL]</button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        function addBulkNames() {
            const textarea = document.getElementById('input-names');
            const rawText = textarea.value;
            
            if (rawText.trim() === "") return;

            const lines = rawText.split('\n');
            
            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (trimmedLine !== "") {
                    tempNames.push(trimmedLine);
                }
            });

            saveToStorage();
            renderList();
            textarea.value = "";
        }

        function deleteName(index) {
            tempNames.splice(index, 1);
            saveToStorage();
            renderList();
        }

        function clearAll() {
            if (confirm("⚠️ SYSTEM WARNING: ยืนยันการล้างข้อมูลเสริมชั่วคราวทั้งหมด?")) {
                tempNames = [];
                saveToStorage();
                renderList();
            }
        }

        function saveToStorage() {
            localStorage.setItem('lucky_names', JSON.stringify(tempNames));
        }
    </script>
</body>
</html>
