<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

        <div class="space-y-4">
            <button id="btn-start" onclick="startRandom()" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-4 px-6 rounded-xl text-xl shadow-lg transition transform active:scale-95 cursor-pointer tech-font tracking-wider glow-magenta border border-pink-400/30">

    <div class="mt-6 text-[10px] text-slate-600 tech-font uppercase tracking-widest">
        <!-- Secure Client-Side // Synthesized Audio Engine V2 -->

    <script>
        let mainList = [];
        let intervalId = null;
        
        // ตัวแปรสำหรับระบบสังเคราะห์เสียง
        let audioCtx = null;

        // ฟังก์ชันเริ่มระบบเสียง (ต้องทำผ่านการคลิกปุ่มของยูสเซอร์ตามกฎความปลอดภัยของบราวเซอร์)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 1. เสียงคลิกสั้นๆ แนว Sci-Fi ปลดล็อค
        function playClickSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 2. เสียงติ๊กๆ ตอนรายชื่อวิ่งหมุนเปลี่ยนไปเรื่อยๆ
        function playTickSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle'; // เสียงทุ้มแน่น ฟิลลิ่งเครื่องจักรกล
            // สุ่มคีย์เสียงเล็กน้อยให้ดูมีมิติ ไม่น่าเบื่อ
            let freq = 200 + Math.random() * 150; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        // 3. เสียงแตร Fanfare ฉลองเมื่อสุ่มได้ผู้โชคดีตัวจริง
        function playWinnerSound() {
            initAudio();
            let now = audioCtx.currentTime;
            // ตัวโน้ตเพลงฉลองแห่งชัยชนะ (C4, E4, G4, C5)
            let notes = [261.63, 329.63, 392.00, 523.25]; 
            
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; // เสียงแตรสว่างสดใสทรงพลัง
                osc.frequency.setValueAtTime(freq, now + (index * 0.12));
                
                gain.gain.setValueAtTime(0.08, now + (index * 0.12));
                gain.gain.linearRampToValueAtTime(0.01, now + (index * 0.12) + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.12));
                osc.stop(now + (index * 0.12) + 0.4);
            });
        }

        // window.onload = function() {
        //     if (typeof EMPLOYEE_DATABASE !== 'undefined' && EMPLOYEE_DATABASE.length > 0) {
        //         mainList = [...EMPLOYEE_DATABASE];
        //     }

        //     const storedNames = localStorage.getItem('lucky_names');
        //     if (storedNames) {

        //                     unit: unit || "TEMP",
        //                     remark: remark || "Added via Control Panel"
        //                 });
        //             }
        //         });
        //     }

        //     document.getElementById('db-status').innerText = `LOADED_RECORDS: ${mainList.length} TARGETS`;

        //     if (mainList.length === 0) {
        //         document.getElementById('display-id').innerText = "ERR_EMPTY";
        //         document.getElementById('display-id').style.color = "#f43f5e";
        //         document.getElementById('display-name').innerText = "ไม่พบฐานข้อมูลพนักงานในระบบ";
        //         const btn = document.getElementById('btn-start');
        //         btn.disabled = true;
        //         btn.classList.add('opacity-30', 'cursor-not-allowed');
        //         btn.innerText = "SYSTEM LOCKED";
        //     }
        // };

        window.onload = function() {
            if (typeof EMPLOYEE_DATABASE !== 'undefined' && EMPLOYEE_DATABASE.length > 0) {
                mainList = [...EMPLOYEE_DATABASE];
            }

            const storedNames = localStorage.getItem('lucky_names');
            if (storedNames) {
                const extraLines = JSON.parse(storedNames);
                extraLines.forEach(line => {
                    // เปลี่ยนจาก .split(/\s+/) เป็นการแยกด้วย | เช่นกัน
                    const columns = line.split('|').map(item => item.trim());
                    const [id, firstName, lastName, department, unit, remark] = columns;
                    if (id) {
                        mainList.push({
                            id: id,
                            firstName: firstName || "Unknown",
                            lastName: lastName || "",
                            department: department || "EXTERNAL",
                            unit: unit || "TEMP",
                            remark: remark || "Added via Control Panel"
                        });
                    }
                });
            }

            document.getElementById('db-status').innerText = `LOADED_RECORDS: ${mainList.length} TARGETS`;

            if (mainList.length === 0) {
                document.getElementById('display-id').innerText = "ERR_EMPTY";
                document.getElementById('display-id').style.color = "#f43f5e";
                document.getElementById('display-name').innerText = "ไม่พบฐานข้อมูลพนักงานในระบบ";
                const btn = document.getElementById('btn-start');
                btn.disabled = true;
                btn.classList.add('opacity-30', 'cursor-not-allowed');
                btn.innerText = "SYSTEM LOCKED";
            }
        };


        function startRandom() {
            if (mainList.length === 0 || intervalId !== null) return;
            
            const btn = document.getElementById('btn-start');
            const card = document.getElementById('display-card');
            const dId = document.getElementById('display-id');
            const dName = document.getElementById('display-name');
            const dDeptUnit = document.getElementById('display-dept-unit');
            // const dRemark = document.getElementById('display-remark');

            playClickSound();

            btn.innerText = "SYSTEM RUNNING...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            card.classList.add('shaking');
            
            // --- ส่วนที่เปลี่ยน: ระบบสุ่มแบบจากเร็วไปช้า ---
            const totalDuration = Math.floor(Math.random() * 3001) + 5000; // สุ่มเวลาทำงาน 5-10 วินาที
            const startTime = Date.now();
            
            const run = () => {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / totalDuration; // ความคืบหน้า (0 ถึง 1)

                // สุ่มรายชื่อแสดงผล
                const randomIndex = Math.floor(Math.random() * mainList.length);
                const emp = mainList[randomIndex];
                dId.innerText = emp.id;
                dName.innerText = `${emp.firstName} ${emp.lastName}`;
                dDeptUnit.innerText = `[ ${emp.department} ]`;
                // dRemark.innerText = `REMARK: ${emp.remark}`;
                playTickSound();

                if (elapsed < totalDuration) {
                    // คำนวณ Delay ให้ค่อยๆ เพิ่มขึ้น (ยิ่งเวลาผ่านไป ยิ่งช้าลง)
                    // เริ่มต้นที่ 50ms และค่อยๆ ช้าลงไปจนถึง 500ms ในช่วงท้าย
                    // ใช้ progress^2 เพื่อให้มันช้าลงแบบเร่งความเร็วในช่วงจบ (Exponential Slower)
                    const currentDelay = 50 + (450 * Math.pow(progress, 2));
                    
                    intervalId = setTimeout(run, currentDelay);
                } else {
                    // หยุดและแสดงผู้ชนะ
                    finalizeWinner();
                }
            };

            const finalizeWinner = () => {
                intervalId = null;
                
                btn.innerText = "RANDOM AGAIN";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                card.classList.remove('shaking');
                
                const finalIndex = Math.floor(Math.random() * mainList.length);
                const winner = mainList[finalIndex];
                
                dId.innerText = `🎯 ${winner.id} 🎯`;
                dName.innerText = `👑 ${winner.firstName} ${winner.lastName} 👑`;
                dDeptUnit.innerText = `${winner.department}`;
                // dRemark.innerText = `หมายเหตุ: ${winner.remark}`;
                
                playWinnerSound();

                card.style.borderColor = "#f59e0b";
                card.style.boxShadow = "0 0 30px rgba(245, 158, 11, 0.8)";
                dId.style.color = "#f59e0b";
                dName.style.color = "#f59e0b";
                
                setTimeout(() => {
                    card.style.borderColor = "";
                    card.style.boxShadow = "";
                    dId.style.color = "";
                    dName.style.color = "";
                }, 3500);
            };

            run(); // เริ่มการสุ่มรอบแรก
            // --- จบส่วนที่เปลี่ยน ---
        }
    </script>
